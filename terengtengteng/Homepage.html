<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Homepage</title>
<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #e6e6e6;
}

header {
    background-color: #1A21A8;
    padding: 15px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: white;
}

.logo img {
    height: 40px;
}

.search-bar {
    width: 400px;
    padding: 8px 15px;
    border-radius: 20px;
    border: none;
    outline: none;
}

.header-right {
    display: flex;
    align-items: center;
    gap: 20px;
    color: white;
}

.header-right span {
    cursor: pointer;
    font-weight: 500;
}

.icon {
    width: 24px;
    height: 24px;
    color: white;
}

.banner-container {
    display: flex;
    gap: 20px;
    padding: 20px 40px;
}

.banner {
    flex: 1;
    height: 350px;
    background: #cfcfcf;
    border-radius: 10px;
}

.kategori-bar {
    background-color: #1A21A8;
    color: white;
    padding: 10px 40px;
    display: flex;
    align-items: center;
    gap: 15px;
}

.kategori-bar button {
    background: white;
    border: none;
    padding: 6px 15px;
    border-radius: 20px;
    cursor: pointer;
}

.product-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 25px;
    padding: 30px 40px;
    max-height: 1200px; 
    overflow: hidden; 
}

.product {
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    height: 150px;
    display: flex;
    flex-direction: column;
    gap: 1px;
}

.product-img {
    width: 100%;
    height: 250px;
    background: #cfcfcf;
    border-radius: 8px;
}

.product-name {
    margin-top: 10px;
    font-size: 14px;
}

.product-price {
    font-size: 13px;
    color: #555;
}

</style>
</head>
<body>

<header>
    <div class="logo">
        <img src="logo.png" alt="Logo">
    </div>

    <input type="text" class="search-bar" placeholder="Search">

    <div class="header-right">
        <span>Bahasa</span>
        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15 21H5C3.89543 21 3 20.1046 3 19V8C3 7.44772 3.44772 7 4 7H14C14.5523 7 15 7.44772 15 8V10.5" 
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M9 12C9 11.4477 9.44772 11 10 11H20C20.5523 11 21 11.4477 21 12V19C21 20.1046 20.1046 21 19 21H11C9.89543 21 9 20.1046 9 19V12Z" 
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 7V6C12 4.34315 10.6569 3 9 3C7.34315 3 6 4.34315 6 6V7" 
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M13 14V15C13 16.1046 13.8954 17 15 17C16.1046 17 17 16.1046 17 15V14" 
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <img src="profile.png" alt="Profile" class="icon">
    </div>
</header>

<div class="banner-container">
    <div class="banner"></div>
    <div class="banner"></div>
</div>

<div class="kategori-bar">
    <div>Kategori</div>
    <button>Favorit</button>
    <button>Populer</button>
    <button>Promo</button>
    <button>Sayuran</button>
    <button>Buah</button>
    <button>Benih</button>
</div>

<div class="product-container" id="productContainer"></div>

<script>
    const container = document.getElementById("productContainer");
    
    const maxProducts = 30;
    
    for (let i = 1; i <= maxProducts; i++) {
        const product = document.createElement("div");
        product.className = "product";
    
        product.innerHTML = `
            <div class="product-img"></div>
            <div class="product-name">Produk ${i}</div>
            <div class="product-price">Rp x </div>
        `;
    
        container.appendChild(product);
    }
</script>

</body>
</html>
